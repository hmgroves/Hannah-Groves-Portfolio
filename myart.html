    <main>
        <section>
            <h2>Digital Paintings</h2>
            <div class="card-row">
                <img src="assets/enrill.png" width="400" alt="A rabbit bard from a DND game. She is brown and white, dressed sparsely in green cloth and gold jewelry, and holding a lute.">
                <img src="assets/mountain.png" width="400" alt="A sketchy painting of several mountains with a lake and forests at their foot. The mountains are covered in snow and the sky is painted in yellow, pink, and blue. The lake reflects the sky colors.">
                <img src="assets/lakeside.png" width="400" alt="A sketchy painting of a lake at sunset. You can see several piers in the lake and the silhouette of pine trees in the foreground. There are pink rays from the setting sun peaking through the clouds.">
                <img src="assets/malley.png" width="400" alt="A reference sheet for a cat named O'Malley. He is a fluffy orange and white tabby with green eyes.">
                <img src="assets/rainyroad.png" width="400" alt="A sketchy painting of a street going through a pine forest during a rainy day. The sky is grey and the trees are reflected in the wet pavement.">
                <img src="assets/lavender.png" width="400" alt="A sketchy painting of a field of lavender at dawn. The camera is positioned low to better see some of the flowers close up. The flowers are various shades of purple and the sky is pale with a spot of yellow where the sun is rising.">
                <img src="assets/mountain2.png" width="400" alt="A sketchy painting of a mountain range on a beautiful day. The peaks are grey with bright blue skies above. At the base of the mountains appears to be a forest and in the foreground are several pine trees.">
            </div>
        </section>
        <section>
            <h2>Animation</h2>
            <div class="card-row">
                <img src="assets/pour.webp" width="400" alt="A gif depicting three fruity drinks. Each glass has ice cubes and fruit in it while an animation of liquid pours into them. The first drink is strawberry and mint with pink liquid. The second is cherry and pineapple with peachy liquid. The last is tangerine slices with orange liquid.">
                <video src="assets/AlterEgo.mp4" width="400" alt="A video of two dnd characters falling through the sky. They change poses in time to the music." controls></video>
                <video src="assets/portugal.mp4" width="400" alt="A video of an animal character running in time to the music. Partway through, wings appear on their back." controls></video>
                <video src="assets/hitormiss.mp4" width="400" alt="A video of a Splatoon player character posing and singing along to the song." controls></video>
            </div>
        </section>
        <section>
            <h2>Physical Media</h2>
            <div class="card-row">
                <img src="assets/earring.jpg" width="400" alt="A close up of several pairs of handmade earrings. They are made of wood with metal hooks and depict several popular video game characters.">
                <img src="assets/puppy.jpg" width="400" alt="The front of a jean jacket that has been embroidered and decorated with many pink hearts, paw prints, and droplet shaped jewels.">
                <img src="assets/puppy2.jpg" width="400" alt="The back of the same jean jacket, showing the main design on the back. It is an all pink image of a dog at a night club. The words underneath read 'Pink Puppy Club'">
                <img src="assets/dragon.jpg" width="400" alt="A gigantic plush dragon being held up by a person. It is made with black and green faux fur fabric with orange button eyes. The dragon is as big as the person holding it.">
            </div>
        </section>
    </main>
